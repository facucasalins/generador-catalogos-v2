name: MoraShop v2 - Pipeline completo

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 12 * * *'  # 09:00 ART (UTC-3) — DESCOMENTAR cuando validemos en prod

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: playwright install --with-deps chromium

      - name: Correr pipeline (Inventario + Selección + Estilo + Storage + Feeds)
        env:
          MORASHOP_TIENDANUBE_STORE_ID: ${{ secrets.MORASHOP_TIENDANUBE_STORE_ID }}
          MORASHOP_TIENDANUBE_TOKEN: ${{ secrets.MORASHOP_TIENDANUBE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          OUTPUT_DIR: ${{ github.workspace }}/placas_output
        run: |
          python -m src.cli --cliente=morashop --output-dir=$OUTPUT_DIR

      - name: Subir placas como artifact (para validación visual)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: placas-morashop
          path: ${{ github.workspace }}/placas_output/*.png
          retention-days: 7
