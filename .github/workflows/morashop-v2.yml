name: MoraShop v2 - Pipeline completo

on:
  workflow_dispatch:
  schedule:
    # 06:07 ART = 09:07 UTC. Minuto no-redondo a propósito: los cron en :00
    # sufren más retraso/skips en GitHub Actions por congestión.
    - cron: '7 9 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Salvaguarda: este pipeline pisa producción (Cloudinary + Sheets con
      # public_id determinístico). Solo debe correr desde main. El schedule
      # ya corre sobre main; esto bloquea dispatch manual desde una rama feature.
      - name: Verificar branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Este workflow solo puede correr desde main. Rama actual: ${{ github.ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache de Playwright. Ahorra ~45s/run en cache-hit.
      # Se invalida si cambia requirements.txt (asume nueva versión de playwright).
      - name: Cache de browsers Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar Chromium para Playwright
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            # Binario en cache: solo instalamos deps del sistema (apt-get libs).
            # Estas no se cachean entre runs.
            playwright install-deps chromium
          else
            # Cache miss (primera vez o requirements cambió):
            # descarga binario + instala deps del sistema.
            playwright install --with-deps chromium
          fi

      - name: Correr pipeline (Inventario + Selección + Enriquecimiento + Estilo + Storage + Feeds)
        env:
          MORASHOP_TIENDANUBE_STORE_ID: ${{ secrets.MORASHOP_TIENDANUBE_STORE_ID }}
          MORASHOP_TIENDANUBE_TOKEN: ${{ secrets.MORASHOP_TIENDANUBE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR: ${{ github.workspace }}/placas_output
        run: |
          python -m src.cli --cliente=morashop --output-dir=$OUTPUT_DIR

      - name: Subir placas como artifact (para validación visual)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: placas-morashop
          path: ${{ github.workspace }}/placas_output/*.png
          retention-days: 7
