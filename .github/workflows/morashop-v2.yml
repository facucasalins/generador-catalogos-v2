name: MoraShop v2 - Inventario

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 12 * * *'  # 09:00 ART (UTC-3) — DESCOMENTAR cuando validemos

jobs:
  inventario:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr Bloque 1 (Inventario)
        env:
          MORASHOP_TIENDANUBE_STORE_ID: ${{ secrets.MORASHOP_TIENDANUBE_STORE_ID }}
          MORASHOP_TIENDANUBE_TOKEN: ${{ secrets.MORASHOP_TIENDANUBE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -m src.cli --cliente=morashop
