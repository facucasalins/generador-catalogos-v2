name: ANTONIA - Pipeline completo

on:
  workflow_dispatch:
  schedule:
    # 07:00 ART = 10:00 UTC (mismo horario que Shark)
    - cron: '0 10 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache de browsers Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar Chromium para Playwright
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            playwright install-deps chromium
          else
            playwright install --with-deps chromium
          fi

      - name: Correr pipeline (Inventario + Selección + Enriquecimiento + Estilo + Storage + Feeds)
        env:
          ANTONIA_TIENDANUBE_STORE_ID: ${{ secrets.ANTONIA_TIENDANUBE_STORE_ID }}
          ANTONIA_TIENDANUBE_TOKEN: ${{ secrets.ANTONIA_TIENDANUBE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR: ${{ github.workspace }}/placas_output
        run: |
          python -m src.cli --cliente=antonia --output-dir=$OUTPUT_DIR

      - name: Subir placas como artifact (para validación visual)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: placas-antonia
          path: ${{ github.workspace }}/placas_output/*.png
          retention-days: 7
