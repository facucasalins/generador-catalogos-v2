<!-- META
nombre: juanita_9x16
aspect_ratio: 9:16
width: 1080
height: 1920
descripcion: Placa Juanita Shoes 9:16 - foto full-bleed, panel degradé de info abajo
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;font-family:'Inter',sans-serif;position:relative;overflow:hidden;background:#F5EFE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
  .product-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scrim-top{position:absolute;top:0;left:0;right:0;height:300px;background:linear-gradient(180deg,rgba(245,239,230,.75)0%,rgba(245,239,230,0)100%);z-index:2;pointer-events:none}
  .brand{position:absolute;top:50px;left:64px;z-index:10}
  .brand .logo{height:210px;width:auto;display:block}
  .info-panel{position:absolute;bottom:0;left:0;right:0;height:560px;padding:150px 80px 64px;z-index:10;text-align:center;background:linear-gradient(180deg,rgba(245,239,230,0)0%,rgba(245,239,230,.55)34%,rgba(245,239,230,.95)62%,#F5EFE6 100%)}
  .benefits{font-size:28px;font-weight:800;color:#1A1A1A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:26px}
  .benefits .dot{color:#A67B5B;margin:0 16px;font-weight:700}
  .price{font-size:140px;font-weight:800;color:#1A1A1A;line-height:1;letter-spacing:-.03em}
  .price-label{font-size:20px;font-weight:600;color:#A67B5B;letter-spacing:.26em;text-transform:uppercase;margin-top:16px}
  .price-list{font-size:31px;font-weight:400;color:#8f8f8f;text-decoration:line-through;margin-top:16px}
  .cuotas{font-size:28px;font-weight:500;color:#1A1A1A;margin-top:18px}
  .cuotas b{color:#A67B5B;font-weight:700}
</style>
</head>
<body>
  <img class="product-image" src="{imagen_b64}" alt="producto">
  <div class="scrim-top"></div>
  <div class="brand"><img class="logo" src="{logo_b64}" alt="Juanita Shoes"></div>
  <div class="info-panel">
    <div class="benefits">20% OFF <span class="dot">·</span> Envío gratis</div>
    <div class="price">{precio_efectivo_formateado}</div>
    <div class="price-label">precio con transferencia</div>
    <div class="price-list">{precio_original_formateado}</div>
    <div class="cuotas"><b>{cuotas_num} cuotas sin interés</b> de {cuota_formateada}</div>
  </div>
</body>
</html>
