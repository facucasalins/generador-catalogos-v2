<!-- META
nombre: juanita_4x5
aspect_ratio: 4:5
width: 1080
height: 1350
descripcion: Placa Juanita Shoes 4:5 (transferencia) - premium. Foto full-bleed, banda frosted baja, halo en texto, nombre auto-ajustable, oculta tachado si == precio.
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;font-family:'Poppins',sans-serif;position:relative;overflow:hidden;background:#ECE6DC;color:#2A2724;-webkit-font-smoothing:antialiased;
    --halo:0 0 8px rgba(252,249,244,.95),0 0 16px rgba(252,249,244,.88),0 0 28px rgba(252,249,244,.6)}

  /* Imagen del producto: fondo full-bleed. Todo lo demas va ENCIMA */
  .product-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}

  /* Logo arriba centrado */
  .brand{position:absolute;top:40px;left:50%;transform:translateX(-50%);z-index:10}
  .brand .logo{height:216px;width:auto;display:block}

  /* Pill envio: outline fino transparente (chico y sutil) */
  .envio{position:absolute;top:180px;left:70px;z-index:10;border:1.5px solid rgba(42,39,36,.38);border-radius:999px;padding:13px 34px;text-align:center;color:#2A2724}
  .envio .e1{font-size:26px;font-weight:500;letter-spacing:.18em;text-shadow:var(--halo)}
  .envio .e2{font-size:22px;font-weight:400;letter-spacing:.04em;opacity:.82;margin-top:2px;text-shadow:var(--halo)}

  /* Banda frosted inferior (semitransparente + blur sobre la foto) */
  .band{position:absolute;left:0;right:0;bottom:0;height:352px;z-index:10;
    background:rgba(244,238,229,.05);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .divider{width:124px;height:2px;background:#A6824E;margin-bottom:30px;box-shadow:0 0 6px rgba(252,249,244,.8)}
  .lbl{font-size:30px;font-weight:500;letter-spacing:.30em;color:#2A2724;text-transform:uppercase;text-shadow:var(--halo)}
  .prow{display:flex;align-items:baseline;justify-content:center;gap:38px;margin-top:16px}
  .strike{font-size:40px;font-weight:400;color:#6E665B;text-decoration:line-through;text-shadow:var(--halo)}
  .price{font-size:108px;font-weight:500;letter-spacing:-.01em;color:#2A2724;line-height:1;text-shadow:var(--halo)}
  .name{font-family:'Montserrat',sans-serif;font-size:62px;font-weight:600;letter-spacing:.13em;color:#2A2724;text-transform:uppercase;padding:0 50px;line-height:1.05;margin-top:34px;text-shadow:var(--halo)}
</style>
</head>
<body>
  <img class="product-image" src="{imagen_b64}" alt="producto">

  <div class="brand"><img class="logo" src="{logo_b64}" alt="Juanita Shoes"></div>

  <div class="envio">
    <div class="e1">ENVÍO GRATIS</div>
    <div class="e2">a todo el país</div>
  </div>

  <!-- OJO: precio_efectivo_formateado = precio promo (col G) x descuento_efectivo_factor (0.80 en pipeline.yaml de juanita). Es el precio CON el -20% de transferencia. NO reemplazar por precio_hotsale_formateado (ese NO tiene el descuento). -->
  <div class="band">
    <div class="divider"></div>
    <div class="lbl">precio con transferencia</div>
    <div class="prow">
      <span class="strike">{precio_original_formateado}</span>
      <span class="price">{precio_efectivo_formateado}</span>
    </div>
    <div class="name">{nombre}</div>
  </div>

  <script>
  function adjust(){
    var strike=document.querySelector('.strike');
    var price=document.querySelector('.price');
    if(strike&&price){
      var n=function(s){return (s||'').replace(/\s+/g,'');};
      if(n(strike.textContent)===n(price.textContent)){strike.style.display='none';}
    }
    var band=document.querySelector('.band');
    var name=document.querySelector('.name');
    if(band&&name){
      var size=parseFloat(getComputedStyle(name).fontSize),min=34,g=0;
      while(band.scrollHeight>band.clientHeight+1&&size>min&&g<160){size-=2;name.style.fontSize=size+'px';g++;}
    }
  }
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(adjust);}else{window.addEventListener('load',adjust);}
  </script>
</body>
</html>
