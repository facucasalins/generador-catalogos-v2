<!-- META
nombre: juanita_4x5
aspect_ratio: 4:5
width: 1080
height: 1350
descripcion: Placa default Juanita Shoes 4:5
-->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juanita 4x5</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F5EFE6;
    position: relative;
    color: #1A1A1A;
  }

  /* sutil textura cuero */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(166, 123, 91, 0.06), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(166, 123, 91, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* WORDMARK arriba */
  .wordmark {
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
  }
  .wordmark .line1, .wordmark .line2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 48px;
    letter-spacing: 0.35em;
    color: #1A1A1A;
    line-height: 0.95;
  }
  .wordmark .line2 {
    margin-top: 4px;
    letter-spacing: 0.45em;
  }

  /* línea divisoria fina */
  .divider {
    position: absolute;
    top: 175px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 1px;
    background: #A67B5B;
    z-index: 10;
  }

  /* IMAGEN PRODUCTO */
  .product-wrap {
    position: absolute;
    top: 215px;
    left: 50%;
    transform: translateX(-50%);
    width: 720px;
    height: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .product-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* BADGE ENVÍO GRATIS - top right */
  .envio-badge {
    position: absolute;
    top: 250px;
    right: 60px;
    background: #1A1A1A;
    color: #F5EFE6;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    z-index: 15;
  }

  /* BADGE DESCUENTO (opcional, top left) */
  .discount-badge {
    position: absolute;
    top: 250px;
    left: 60px;
    background: #A67B5B;
    color: #F5EFE6;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    z-index: 15;
  }
  .discount-badge .pct {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .discount-badge .off {
    font-size: 11px;
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  /* BLOQUE DE PRECIOS - bottom */
  .price-block {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 40px 60px 50px;
    z-index: 10;
    text-align: center;
  }

  .price-transferencia {
    font-family: 'Inter', sans-serif;
    font-size: 96px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .transfer-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #7A8471;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .price-list {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: #8A8A8A;
    text-decoration: line-through;
    margin-top: 14px;
    letter-spacing: 0.02em;
  }

  .cuotas {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: #1A1A1A;
    margin-top: 18px;
    letter-spacing: 0.03em;
  }
  .cuotas .highlight {
    color: #A67B5B;
    font-weight: 600;
  }

  /* hide elements when empty */
  .discount-badge.hidden,
  .price-list.hidden { display: none; }
</style>
</head>
<body>

  <div class="wordmark">
    <div class="line1">JUANITA</div>
    <div class="line2">SHOES</div>
  </div>
  <div class="divider"></div>

  <div class="discount-badge" id="discountBadge">
    <div class="pct" id="discountPct">35</div>
    <div class="off">% OFF</div>
  </div>

  <div class="envio-badge">ENVÍO GRATIS</div>

  <div class="product-wrap">
    <img id="productImg" src="" alt="">
  </div>

  <div class="price-block">
    <div class="price-transferencia" id="precioTransferencia">$153.600</div>
    <div class="transfer-label">precio con transferencia · 20% off</div>
    <div class="price-list" id="precioLista">$192.000</div>
    <div class="cuotas">
      <span class="highlight">9 cuotas sin interés</span> de <span id="precioCuota">$21.333</span>
    </div>
  </div>

</body>
</html>
