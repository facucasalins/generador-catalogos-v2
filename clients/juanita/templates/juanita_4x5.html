<!-- META
nombre: juanita_4x5
aspect_ratio: 4:5
width: 1080
height: 1350
descripcion: Placa Juanita Shoes 4:5 (transferencia) - foto full-bleed, elementos encima, oval precio
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;font-family:'Inter',sans-serif;position:relative;overflow:hidden;background:#EDE7DD;color:#1A1A1A;-webkit-font-smoothing:antialiased}

  /* Imagen del producto: fondo full-bleed. Todo lo demas va ENCIMA (z-index > 1) */
  .product-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}

  /* Degrade inferior para legibilidad del texto (encima de la foto, debajo del texto) */
  .scrim-bottom{position:absolute;left:0;right:0;bottom:0;height:580px;z-index:5;pointer-events:none;background:linear-gradient(180deg,rgba(237,231,221,0)0%,rgba(237,231,221,.6)30%,rgba(237,231,221,.96)60%,#EDE7DD 100%)}

  /* Logo arriba centrado */
  .brand{position:absolute;top:34px;left:50%;transform:translateX(-50%);z-index:10}
  .brand .logo{height:110px;width:auto;display:block}

  /* Pill envio arriba izquierda */
  .envio{position:absolute;top:200px;left:64px;z-index:10;background:#fff;border-radius:999px;padding:20px 52px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.10)}
  .envio .t1{font-size:42px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;line-height:1}
  .envio .t2{font-size:28px;font-weight:500;color:#3a3a3a;margin-top:4px}

  /* Bloque info abajo (encima de la imagen) */
  .info{position:absolute;left:0;right:0;bottom:46px;z-index:10;text-align:center}
  .product-name{font-size:44px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:#1A1A1A;margin-bottom:10px}
  .price-list{font-size:38px;font-weight:500;color:#4a4a4a;text-decoration:line-through;text-decoration-color:#d11a1a;text-decoration-thickness:3px;margin-bottom:18px}

  .price-pill{width:760px;height:232px;margin:0 auto;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,0,0,.12)}
  .pill-label{font-size:30px;font-weight:500;color:#2a2a2a;margin-bottom:2px}
  .pill-price{font-size:150px;font-weight:800;color:#111;line-height:1;letter-spacing:-.02em}
</style>
</head>
<body>
  <img class="product-image" src="{imagen_b64}" alt="producto">
  <div class="scrim-bottom"></div>

  <div class="brand"><img class="logo" src="{logo_b64}" alt="Juanita Shoes"></div>

  <div class="envio">
    <div class="t1">Envío gratis</div>
    <div class="t2">a todo el país</div>
  </div>

  <div class="info">
    <div class="product-name">{nombre}</div>
    <div class="price-list">{precio_original_formateado}</div>
    <div class="price-pill">
      <div class="pill-label">precio con transferencia</div>
      <div class="pill-price">{precio_hotsale_formateado}</div>
    </div>
  </div>
</body>
</html>
