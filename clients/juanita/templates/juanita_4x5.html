<!-- META
nombre: juanita_4x5
aspect_ratio: 4:5
width: 1080
height: 1350
descripcion: Placa Juanita Shoes 4:5 - foto full-bleed, panel degradé de info abajo
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;font-family:'Inter',sans-serif;position:relative;overflow:hidden;background:#F5EFE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
  .product-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scrim-top{position:absolute;top:0;left:0;right:0;height:240px;background:linear-gradient(180deg,rgba(245,239,230,.75)0%,rgba(245,239,230,0)100%);z-index:2;pointer-events:none}
  .brand{position:absolute;top:40px;left:56px;z-index:10}
  .brand .logo{height:170px;width:auto;display:block}
  .info-panel{position:absolute;bottom:0;left:0;right:0;height:470px;padding:130px 70px 50px;z-index:10;text-align:center;background:linear-gradient(180deg,rgba(245,239,230,0)0%,rgba(245,239,230,.55)34%,rgba(245,239,230,.95)62%,#F5EFE6 100%)}
  .benefits{font-size:25px;font-weight:800;color:#1A1A1A;letter-spacing:.16em;text-transform:uppercase;margin-bottom:22px}
  .benefits .dot{color:#A67B5B;margin:0 14px;font-weight:700}
  .price{font-size:124px;font-weight:800;color:#1A1A1A;line-height:1;letter-spacing:-.03em}
  .price-label{font-size:17px;font-weight:600;color:#A67B5B;letter-spacing:.26em;text-transform:uppercase;margin-top:14px}
  .price-list{font-size:27px;font-weight:400;color:#8f8f8f;text-decoration:line-through;margin-top:14px}
  .cuotas{font-size:24px;font-weight:500;color:#1A1A1A;margin-top:16px}
  .cuotas b{color:#A67B5B;font-weight:700}
</style>
</head>
<body>
  <img class="product-image" src="{imagen_b64}" alt="producto">
  <div class="scrim-top"></div>
  <div class="brand"><img class="logo" src="{logo_b64}" alt="Juanita Shoes"></div>
  <div class="info-panel">
    <div class="benefits">20% OFF <span class="dot">·</span> Envío gratis</div>
    <div class="price">{precio_efectivo_formateado}</div>
    <div class="price-label">precio con transferencia</div>
    <div class="price-list">{precio_original_formateado}</div>
    <div class="cuotas"><b>{cuotas_num} cuotas sin interés</b> de {cuota_formateada}</div>
  </div>
</body>
</html>
