<!-- META
nombre: juanita_4x5
aspect_ratio: 4:5
width: 1080
height: 1350
descripcion: Placa default Juanita Shoes 4:5 - foto full-bleed, panel de precios cuero/beige abajo
-->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juanita 4x5</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
    background: #F5EFE6;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
  }

  /* FOTO DEL PRODUCTO: full-bleed (no asume fondo blanco) */
  .product-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }

  /* Scrim superior beige para legibilidad del wordmark */
  .scrim-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 380px;
    background: linear-gradient(180deg,
      rgba(245, 239, 230, 0.85) 0%,
      rgba(245, 239, 230, 0.45) 45%,
      rgba(245, 239, 230, 0) 100%);
    z-index: 2; pointer-events: none;
  }

  /* MARCA: logo real + wordmark JUANITA SHOES */
  .brand {
    position: absolute; top: 48px; left: 0; right: 0;
    text-align: center; z-index: 10;
  }
  .brand .logo {
    height: 92px; width: auto; display: inline-block;
    margin-bottom: 14px;
  }
  .wordmark .line1, .wordmark .line2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 44px;
    letter-spacing: 0.35em; color: #1A1A1A; line-height: 0.95;
  }
  .wordmark .line2 { margin-top: 4px; letter-spacing: 0.45em; }

  .divider {
    width: 60px; height: 1px; background: #A67B5B;
    margin: 16px auto 0 auto;
  }

  /* BADGE ENVÍO GRATIS - top right */
  .envio-badge {
    position: absolute; top: 230px; right: 60px;
    background: #1A1A1A; color: #F5EFE6;
    padding: 10px 18px;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    z-index: 15;
  }

  /* BADGE DESCUENTO - top left (cuero) */
  .discount-badge {
    position: absolute; top: 215px; left: 60px;
    background: #A67B5B; color: #F5EFE6;
    width: 92px; height: 92px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 15;
    box-shadow: 0 6px 18px rgba(80, 50, 35, 0.28);
  }
  .discount-badge .pct { font-size: 30px; font-weight: 700; line-height: 1; }
  .discount-badge .off { font-size: 11px; letter-spacing: 0.2em; margin-top: 2px; }

  /* PANEL DE PRECIOS - abajo, beige translúcido para legibilidad sobre foto */
  .price-block {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 44px 60px 54px;
    z-index: 10; text-align: center;
    background: linear-gradient(180deg,
      rgba(245, 239, 230, 0) 0%,
      rgba(245, 239, 230, 0.85) 22%,
      rgba(245, 239, 230, 0.97) 100%);
  }

  .price-transferencia {
    font-family: 'Inter', sans-serif;
    font-size: 96px; font-weight: 700;
    color: #1A1A1A; line-height: 1; letter-spacing: -0.02em;
  }
  .transfer-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    color: #A67B5B; letter-spacing: 0.3em;
    text-transform: uppercase; margin-top: 8px;
  }
  .price-list {
    font-family: 'Inter', sans-serif;
    font-size: 22px; font-weight: 400;
    color: #8A8A8A; text-decoration: line-through;
    margin-top: 14px; letter-spacing: 0.02em;
  }
  .cuotas {
    font-family: 'Inter', sans-serif;
    font-size: 18px; font-weight: 500;
    color: #1A1A1A; margin-top: 18px; letter-spacing: 0.03em;
  }
  .cuotas .highlight { color: #A67B5B; font-weight: 600; }
</style>
</head>
<body>
  <img class="product-image" src="{imagen_b64}" alt="producto">
  <div class="scrim-top"></div>

  <div class="brand">
    <img class="logo" src="{logo_b64}" alt="Juanita Shoes">
    <div class="wordmark">
      <div class="line1">JUANITA</div>
      <div class="line2">SHOES</div>
    </div>
    <div class="divider"></div>
  </div>

  <div class="discount-badge">
    <div class="pct">20</div>
    <div class="off">% OFF</div>
  </div>

  <div class="envio-badge">ENVÍO GRATIS</div>

  <div class="price-block">
    <div class="price-transferencia">{precio_efectivo_formateado}</div>
    <div class="transfer-label">precio con transferencia · 20% off</div>
    <div class="price-list">{precio_original_formateado}</div>
    <div class="cuotas">
      <span class="highlight">{cuotas_num} cuotas sin interés</span> de {cuota_formateada}
    </div>
  </div>
</body>
</html>
