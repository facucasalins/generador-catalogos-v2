# ====================================================================
# Pipeline de Antonia V1
# ====================================================================
# Onboarding: 2026-05-27
# Tienda: Tiendanube (vía app "Agency Nusa Analytics", App ID 28059)
# Rubro: Zapatos
# ====================================================================
cliente:
  nombre: antonia
  brand_name: ANTONIA
  zona_horaria: America/Argentina/Buenos_Aires
# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: ANTONIA_TIENDANUBE_STORE_ID
    access_token_secret: ANTONIA_TIENDANUBE_TOKEN
    # Antonia vende zapatos: cada producto TN tiene variantes de talle/color,
    # todas valen lo mismo y el link manda a la página del producto donde
    # el comprador elige. Misma lógica que Shark: 1 fila por producto TN.
    # SKU = handle (Identificador de URL TN), ej: "stiletto-negro-clasico".
    agrupar_por_producto: true
    sheet_destino:
      id: "REEMPLAZAR_SHEET_ID_INVENTARIO_ANTONIA"
      pestaña: Inventario
# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "REEMPLAZAR_SHEET_ID_SELECCION_ANTONIA"
      pestaña: Seleccion
    template_default: default
# ============ BLOQUE 3: ENRIQUECIMIENTO ============
# Gemini genera titulo_corto + descripcion_corta + tips.
# Cache en pestaña 'Enriquecimiento' del sheet de Inventario.
enriquecimiento:
  proveedor: gemini
  config:
    api_key_secret: GEMINI_API_KEY
    modelo: gemini-2.5-flash
    max_chars_titulo: 60
    max_chars_descripcion: 200
    cantidad_tips: 3
    max_chars_tip: 40
    tono: "Argentino, femenino, elegante pero cercano. Dirigido a mujeres que les gusta la moda y los zapatos. Usa voseo cuando corresponda (ej: 'llevátelos', 'son para vos'). Lenguaje natural, evita lo cursi."
# ============ BLOQUE 4: ESTILO ============
# Antonia aplica:
# - 20% off sobre precio promocional para pago en efectivo/transferencia
#   → variable {precio_efectivo_formateado} = precio_promocional * 0.80
# - 6 cuotas sin interés sobre precio promocional (SIN aplicar el 20%)
#   → variable {cuota_formateada} = precio_promocional / 6
# - Envío gratis a partir de $150.000 (mostrado fijo en el template)
estilo:
  motor: playwright_html
  config:
    placa_width: 1080
    placa_height: 1350
    hotsale_discount_factor: 1.0
    descuento_efectivo_factor: 0.80   # 20% off para transferencia/efectivo
    cuotas_sobre_promocional: true    # cuotas sobre el precio_promocional
    cuotas_num: 6                     # 6 cuotas sin interés
    aspect_ratios:
      - label: "4:5"
        width: 1080
        height: 1350
        template_suffix: ""
      - label: "9:16"
        width: 1080
        height: 1920
        template_suffix: "_tiktok"
    variables_globales:
      brand_name: ANTONIA
      logo_url: "REEMPLAZAR_URL_LOGO_ANTONIA"
      evento_legal: ""
      envio_gratis_desde: "$150.000"
# ============ BLOQUE 5: DISTRIBUCIÓN ============
# Reusa la cuenta de Cloudinary compartida (folder distinto).
distribucion:
  storage:
    backend: cloudinary
    config:
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      folder: antonia
  destinos:
    - tipo: meta_catalog
      config:
        sheet_id: "REEMPLAZAR_SHEET_ID_SELECCION_ANTONIA"
        moneda: ARS
        calcular_availability_por_stock: true
    - tipo: tiktok_catalog
      config:
        sheet_id: "REEMPLAZAR_SHEET_ID_SELECCION_ANTONIA"
        moneda: ARS
        calcular_availability_por_stock: true
