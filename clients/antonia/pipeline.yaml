# ====================================================================
# Pipeline de Antonia V2 (multi-template)
# ====================================================================
cliente:
  nombre: antonia
  brand_name: ANTONIA
  zona_horaria: America/Argentina/Buenos_Aires

# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: ANTONIA_TIENDANUBE_STORE_ID
    access_token_secret: ANTONIA_TIENDANUBE_TOKEN
    agrupar_por_producto: true
    cuotas_num: 6
    sheet_destino:
      id: "1iRy8tQHPB_qDD-Hd3NjnAKWmGa3dARnFQn0sA_ycGX0"
      pestaña: Inventario

# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "1B6xSOMG2VfR67FzsDfHJPW4aEmK1xdkUFqCmZlWhQUk"
      pestaña: Seleccion

# ============ BLOQUE 3: ENRIQUECIMIENTO ============
enriquecimiento:
  proveedor: gemini
  config:
    api_key_secret: GEMINI_API_KEY
    modelo: gemini-2.5-flash
    max_chars_titulo: 60
    max_chars_descripcion: 200
    cantidad_tips: 3
    max_chars_tip: 40
    tono: "Argentino, femenino, elegante pero cercano. Dirigido a mujeres que les gusta la moda. Usa voseo. Lenguaje natural."

# ============ BLOQUE 4: ESTILO ============
# Cada template tiene sus dimensiones declaradas en el comentario <!-- META -->
# del HTML. Ya no se configuran aspect_ratios acá.
estilo:
  motor: playwright_html
  config:
    hotsale_discount_factor: 1.0
    descuento_efectivo_factor: 0.80
    cuotas_sobre_promocional: true
    variables_globales:
      brand_name: ANTONIA
      logo_url: "https://acdn-us.mitiendanube.com/stores/005/181/517/themes/common/logo-94768175-1726830880-650fcd77bfd42f301d06dab1a092e1431726830880.png?0"
      evento_legal: ""
      envio_gratis_desde: "$150.000"

# ============ BLOQUE 5: DISTRIBUCIÓN ============
distribucion:
  storage:
    backend: cloudinary
    config:
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      folder: antonia

  destinos:
    # Meta acepta 4:5, 1:1 y también 9:16 para Reels.
    - tipo: meta_catalog
      config:
        sheet_id: "1C719_BmDZCsdluk5PwVTfUazYFp9BPywQJ_Ubx7FIQs"
        moneda: ARS
        calcular_availability_por_stock: true
        aspect_ratios_aceptados: ["4:5", "1:1", "9:16"]

    # TikTok acepta cualquier aspect ratio.
    - tipo: tiktok_catalog
      config:
        sheet_id: "1C719_BmDZCsdluk5PwVTfUazYFp9BPywQJ_Ubx7FIQs"
        moneda: ARS
        calcular_availability_por_stock: true
        aspect_ratios_aceptados: ["4:5", "9:16", "1:1"]
