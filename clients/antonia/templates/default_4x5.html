<!-- DESC: Placa default Antonia (4:5 Meta) — precio efectivo grande, cuotas en pill secundaria -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        width: 1080px;
        height: 1350px;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        background: #e8ddd0;
        color: #3a2a24;
        -webkit-font-smoothing: antialiased;
    }

    .product-image {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 1;
    }

    .overlay-base {
        position: absolute; inset: 0;
        background: linear-gradient(180deg,
            rgba(255, 245, 235, 0.30) 0%,
            rgba(255, 245, 235, 0.08) 20%,
            rgba(232, 221, 208, 0.05) 42%,
            rgba(212, 168, 156, 0.60) 70%,
            rgba(180, 130, 120, 0.92) 100%);
        z-index: 2;
    }

    .overlay-tint {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 35%, rgba(180, 130, 120, 0.18) 100%);
        z-index: 3; pointer-events: none;
    }

    /* Banner superior: 1 línea, texto chico bold para que entre cómodo */
    .top-banner {
        position: absolute; top: 0; left: 0; right: 0;
        height: 78px;
        background: rgba(212, 168, 156, 0.94);
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        z-index: 8;
        font-family: 'Inter', sans-serif;
        font-size: 19px; font-weight: 800; letter-spacing: 1.4px;
        color: #ffffff; text-transform: uppercase;
        text-shadow: 0 1px 3px rgba(120, 70, 60, 0.3);
        padding: 0 30px;
        white-space: nowrap;
    }

    .header { position: absolute; top: 110px; right: 55px; z-index: 10; }

    .logo {
        height: 130px; width: auto;
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 14px rgba(80, 50, 45, 0.6))
                drop-shadow(0 0 24px rgba(80, 50, 45, 0.4));
        display: block;
    }

    .info-zone {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 0 70px 60px 70px;
        z-index: 10; text-align: center;
        text-shadow: 0 2px 14px rgba(80, 50, 45, 0.75);
    }

    .precio-tachado {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic; font-size: 34px; font-weight: 500;
        color: rgba(255, 245, 235, 0.85);
        text-decoration: line-through;
        text-decoration-color: rgba(255, 245, 235, 0.85);
        text-decoration-thickness: 2px;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
    }

    .precio-principal {
        font-family: 'Playfair Display', serif;
        font-size: 128px; font-weight: 900;
        line-height: 1; letter-spacing: -3px;
        color: #fff5eb;
        margin-bottom: 14px;
        text-shadow:
            0 4px 24px rgba(80, 50, 45, 0.85),
            0 0 60px rgba(80, 50, 45, 0.5);
    }

    .precio-condicion {
        font-family: 'Inter', sans-serif;
        font-size: 16px; font-weight: 700;
        letter-spacing: 3.5px;
        color: #fff5eb; text-transform: uppercase;
        margin-bottom: 24px;
        text-shadow: 0 1px 8px rgba(80, 50, 45, 0.9);
        opacity: 0.95;
    }

    .divider {
        width: 60px; height: 1.5px;
        background: rgba(255, 245, 235, 0.85);
        margin: 0 auto 18px auto;
    }

    .nombre {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic; font-size: 38px; font-weight: 600;
        color: #fff5eb;
        letter-spacing: 0.5px; line-height: 1.15;
        margin-bottom: 24px;
        display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden;
        text-shadow: 0 2px 16px rgba(80, 50, 45, 0.9);
    }

    .pills { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }

    .pill {
        display: inline-flex; align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 19px; font-weight: 700; letter-spacing: 1.6px;
        padding: 14px 26px;
        background: rgba(255, 245, 235, 0.95);
        color: #8a4f44;
        border-radius: 50px; text-transform: uppercase;
        text-shadow: none;
        box-shadow: 0 4px 16px rgba(80, 50, 45, 0.25);
    }

    .pill-cuotas { background: rgba(212, 168, 156, 0.97); color: #fff5eb; }

    .pill-cuotas .cuotas-mini {
        font-weight: 500; margin-left: 8px; opacity: 0.92;
        font-size: 15px; letter-spacing: 0.5px; text-transform: none;
    }
</style>
</head>
<body>
    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-base"></div>
    <div class="overlay-tint"></div>

    <div class="top-banner">Envío gratis +$150.000 · {cuotas_num} cuotas sin interés · 20% OFF Transferencia</div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="precio-tachado">{precio_original_formateado}</div>
        <div class="precio-principal">{precio_efectivo_formateado}</div>
        <div class="precio-condicion">En transferencia</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="pills">
            <div class="pill">Envío gratis</div>
            <div class="pill pill-cuotas">{cuotas_num} cuotas <span class="cuotas-mini">de {cuota_formateada}</span></div>
        </div>
    </div>
</body>
</html>
