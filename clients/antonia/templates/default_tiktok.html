<!-- DESC: Placa default Antonia (9:16 Tiktok) — foto full-bleed, precio efectivo, 6 cuotas sobre promo -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 1080px;
        height: 1920px;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        background: #0a0a0a;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
    }

    .product-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* Gradient: oscurece la zona donde está la info (centro-bajo, ~1200-1600px)
       dejando arriba y la parte inferior más limpios (la parte inferior va a
       quedar tapada por TikTok igual, no necesita oscurecerse mucho). */
    .overlay-base {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 95% 30% at 50% 72%, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.50) 60%, rgba(0, 0, 0, 0.10) 100%),
            linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.05) 70%, rgba(0, 0, 0, 0.30) 100%);
        z-index: 2;
    }

    .overlay-tint {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 30%, rgba(15, 12, 0, 0.30) 100%),
            linear-gradient(135deg, rgba(212, 160, 23, 0.05) 0%, rgba(0, 0, 0, 0) 50%, rgba(212, 160, 23, 0.05) 100%);
        z-index: 3;
        pointer-events: none;
    }

    .accent-line {
        position: absolute;
        left: 70px;
        top: 60px;
        width: 2px;
        height: 80px;
        background: linear-gradient(180deg, #d4a017 0%, transparent 100%);
        z-index: 5;
    }

    .header {
        position: absolute;
        top: 50px;
        right: 70px;
        z-index: 10;
    }

    .logo {
        height: 100px;
        width: auto;
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 14px rgba(0, 0, 0, 0.85))
                drop-shadow(0 0 30px rgba(0, 0, 0, 0.6));
        display: block;
    }

    /* Info-zone: empieza a 1/3 desde abajo.
       Placa = 1920px de alto. 1/3 desde abajo = 1920 - 640 = 1280px del top.
       Ahí arranca la info y se desarrolla hacia arriba (margin-bottom en cada
       bloque la "empuja" hacia arriba si crece). */
    .info-zone {
        position: absolute;
        top: 1180px;
        left: 0;
        right: 0;
        padding: 0 80px;
        z-index: 10;
        text-align: center;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.9);
    }

    .precio-tachado {
        font-family: 'Inter', sans-serif;
        font-size: 46px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: line-through;
        text-decoration-color: #d4a017;
        text-decoration-thickness: 3px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
    }

    .precio-principal {
        font-family: 'Inter', sans-serif;
        font-size: 180px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -5px;
        color: #ffffff;
        margin-bottom: 14px;
        text-shadow:
            0 6px 30px rgba(0, 0, 0, 0.95),
            0 0 80px rgba(0, 0, 0, 0.7),
            0 0 120px rgba(212, 160, 23, 0.2);
    }

    .precio-condicion {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 3.5px;
        color: #d4a017;
        text-transform: uppercase;
        margin-bottom: 28px;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.9);
    }

    .divider {
        width: 80px;
        height: 4px;
        background: #d4a017;
        margin: 0 auto 26px auto;
        box-shadow: 0 0 14px rgba(212, 160, 23, 0.6);
    }

    .nombre {
        font-family: 'Inter', sans-serif;
        font-size: 38px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.3px;
        line-height: 1.2;
        margin-bottom: 36px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.95);
    }

    .pills {
        display: flex;
        justify-content: center;
        gap: 22px;
        flex-wrap: wrap;
    }

    .pill {
        display: inline-flex;
        align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2.2px;
        padding: 20px 34px;
        border: 2.5px solid #d4a017;
        color: #d4a017;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(6px);
        border-radius: 3px;
        text-transform: uppercase;
        text-shadow: none;
    }

    .pill-cuotas {
        background: rgba(212, 160, 23, 0.97);
        color: #0a0a0a;
        border-color: #d4a017;
    }

    .pill-cuotas .cuotas-mini {
        font-weight: 600;
        margin-left: 12px;
        color: #0a0a0a;
        opacity: 0.85;
        font-size: 19px;
        letter-spacing: 0.5px;
        text-transform: none;
    }
</style>
</head>
<body>

    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-base"></div>
    <div class="overlay-tint"></div>
    <div class="accent-line"></div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="precio-tachado">{precio_original_formateado}</div>
        <div class="precio-principal">{precio_efectivo_formateado}</div>
        <div class="precio-condicion">En efectivo o transferencia</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="pills">
            <div class="pill">Envío gratis +$150K</div>
            <div class="pill pill-cuotas">{cuotas_num} cuotas <span class="cuotas-mini">de {cuota_formateada}</span></div>
        </div>
    </div>

</body>
</html>
