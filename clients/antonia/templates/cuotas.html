<!-- DESC: Placa cuotas Antonia (4:5 Meta) — protagonista es "N cuotas de $X", precio total chico abajo -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        width: 1080px; height: 1350px;
        font-family: 'Inter', sans-serif;
        position: relative; overflow: hidden;
        background: #e8ddd0; color: #3a2a24;
        -webkit-font-smoothing: antialiased;
    }

    .product-image {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 1;
    }

    .overlay-base {
        position: absolute; inset: 0;
        background: linear-gradient(180deg,
            rgba(255, 245, 235, 0.35) 0%,
            rgba(255, 245, 235, 0.10) 22%,
            rgba(232, 221, 208, 0.05) 45%,
            rgba(212, 168, 156, 0.65) 75%,
            rgba(180, 130, 120, 0.92) 100%);
        z-index: 2;
    }

    .overlay-tint {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 35%, rgba(180, 130, 120, 0.18) 100%);
        z-index: 3; pointer-events: none;
    }

    .top-banner {
        position: absolute; top: 0; left: 0; right: 0;
        height: 95px;
        background: rgba(212, 168, 156, 0.94);
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        z-index: 8;
        font-family: 'Inter', sans-serif;
        font-size: 24px; font-weight: 800; letter-spacing: 2.3px;
        color: #ffffff; text-transform: uppercase;
        text-shadow: 0 1px 3px rgba(120, 70, 60, 0.3);
    }

    .header { position: absolute; top: 130px; right: 60px; z-index: 10; }

    .logo {
        height: 150px; width: auto;
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 14px rgba(80, 50, 45, 0.6))
                drop-shadow(0 0 24px rgba(80, 50, 45, 0.4));
        display: block;
    }

    .info-zone {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 0 70px 70px 70px;
        z-index: 10; text-align: center;
        text-shadow: 0 2px 14px rgba(80, 50, 45, 0.75);
    }

    /* "6 CUOTAS DE" — etiqueta arriba */
    .cuotas-label {
        font-family: 'Inter', sans-serif;
        font-size: 36px; font-weight: 800;
        letter-spacing: 5px;
        color: #fff5eb; text-transform: uppercase;
        margin-bottom: 4px;
        text-shadow: 0 2px 10px rgba(80, 50, 45, 0.9);
    }

    /* PRECIO DE LA CUOTA — el protagonista de esta placa */
    .cuota-principal {
        font-family: 'Playfair Display', serif;
        font-size: 168px; font-weight: 900;
        line-height: 1; letter-spacing: -3px;
        color: #fff5eb;
        margin-bottom: 12px;
        text-shadow:
            0 4px 24px rgba(80, 50, 45, 0.85),
            0 0 60px rgba(80, 50, 45, 0.5);
    }

    .sin-interes {
        font-family: 'Inter', sans-serif;
        font-size: 20px; font-weight: 700;
        letter-spacing: 4.5px;
        color: #fff5eb; text-transform: uppercase;
        margin-bottom: 30px;
        text-shadow: 0 1px 8px rgba(80, 50, 45, 0.9);
        opacity: 0.95;
    }

    .divider {
        width: 70px; height: 1.5px;
        background: rgba(255, 245, 235, 0.85);
        margin: 0 auto 22px auto;
    }

    .nombre {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic; font-size: 42px; font-weight: 600;
        color: #fff5eb;
        letter-spacing: 0.5px; line-height: 1.15;
        margin-bottom: 18px;
        display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden;
        text-shadow: 0 2px 16px rgba(80, 50, 45, 0.9);
    }

    /* Precio total chico abajo */
    .precio-total {
        font-family: 'Inter', sans-serif;
        font-size: 25px; font-weight: 600;
        letter-spacing: 1.2px;
        color: rgba(255, 245, 235, 0.92);
        margin-bottom: 26px;
        text-shadow: 0 1px 8px rgba(80, 50, 45, 0.85);
    }

    .precio-total .precio-total-valor {
        font-weight: 800;
        margin-left: 8px;
    }

    .pills { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; }

    .pill {
        display: inline-flex; align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 21px; font-weight: 700; letter-spacing: 1.8px;
        padding: 16px 30px;
        background: rgba(255, 245, 235, 0.95);
        color: #8a4f44;
        border-radius: 50px; text-transform: uppercase;
        text-shadow: none;
        box-shadow: 0 4px 16px rgba(80, 50, 45, 0.25);
    }

    .pill-transferencia {
        background: rgba(212, 168, 156, 0.97);
        color: #fff5eb;
    }
</style>
</head>
<body>
    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-base"></div>
    <div class="overlay-tint"></div>

    <div class="top-banner">Envío gratis +$150.000 · {cuotas_num} cuotas sin interés · 20% OFF Transferencia</div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="cuotas-label">{cuotas_num} cuotas de</div>
        <div class="cuota-principal">{cuota_formateada}</div>
        <div class="sin-interes">Sin interés</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="precio-total">Precio total: <span class="precio-total-valor">{precio_hotsale_formateado}</span></div>
        <div class="pills">
            <div class="pill">Envío gratis</div>
            <div class="pill pill-transferencia">20% OFF Transferencia</div>
        </div>
    </div>
</body>
</html>
