<!-- DESC: Placa default Antonia (4:5 Meta) — foto full-bleed, precio efectivo, 6 cuotas sobre promo -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 1080px;
        height: 1350px;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        background: #0a0a0a;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
    }

    /* IMAGEN DEL PRODUCTO: cubre toda la placa (fondo) */
    .product-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* OVERLAY BASE: gradient oscuro inferior para legibilidad del texto */
    .overlay-base {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.45) 0%,
            rgba(0, 0, 0, 0.20) 25%,
            rgba(0, 0, 0, 0.15) 45%,
            rgba(0, 0, 0, 0.70) 72%,
            rgba(0, 0, 0, 0.95) 100%
        );
        z-index: 2;
    }

    /* TINT dorado sutil para cohesión cromática */
    .overlay-tint {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 30%, rgba(15, 12, 0, 0.40) 100%),
            linear-gradient(135deg, rgba(212, 160, 23, 0.06) 0%, rgba(0, 0, 0, 0) 50%, rgba(212, 160, 23, 0.06) 100%);
        z-index: 3;
        pointer-events: none;
    }

    /* Línea fina amarilla decorativa esquina superior izquierda */
    .accent-line {
        position: absolute;
        left: 60px;
        top: 60px;
        width: 2px;
        height: 80px;
        background: linear-gradient(180deg, #d4a017 0%, transparent 100%);
        z-index: 5;
    }

    /* LOGO arriba a la derecha, GRANDE, sin fondo (transparente) */
    .header {
        position: absolute;
        top: 50px;
        right: 50px;
        z-index: 10;
    }

    .logo {
        height: 90px;
        width: auto;
        /* Logo blanco con drop-shadow fuerte para que sea legible
           sobre cualquier foto (clara, oscura, contrastada) */
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 12px rgba(0, 0, 0, 0.85))
                drop-shadow(0 0 24px rgba(0, 0, 0, 0.6));
        display: block;
    }

    /* INFO ZONE: precio + nombre + pills */
    .info-zone {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 70px 80px 70px;
        z-index: 10;
        text-align: center;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.9);
    }

    /* Precio tachado (precio lista, el original) */
    .precio-tachado {
        font-family: 'Inter', sans-serif;
        font-size: 36px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: line-through;
        text-decoration-color: #d4a017;
        text-decoration-thickness: 2.5px;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
    }

    /* Precio principal = precio EFECTIVO (transferencia, -20% sobre promo) */
    .precio-principal {
        font-family: 'Inter', sans-serif;
        font-size: 172px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -5px;
        color: #ffffff;
        margin-bottom: 14px;
        text-shadow:
            0 4px 24px rgba(0, 0, 0, 0.95),
            0 0 60px rgba(0, 0, 0, 0.7),
            0 0 100px rgba(212, 160, 23, 0.18);
    }

    /* Texto chico "EN EFECTIVO O TRANSFERENCIA" debajo del precio */
    .precio-condicion {
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #d4a017;
        text-transform: uppercase;
        margin-bottom: 28px;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9);
    }

    /* Línea separadora amarilla */
    .divider {
        width: 60px;
        height: 3px;
        background: #d4a017;
        margin: 0 auto 24px auto;
        box-shadow: 0 0 12px rgba(212, 160, 23, 0.6);
    }

    /* Nombre del producto */
    .nombre {
        font-family: 'Inter', sans-serif;
        font-size: 34px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.3px;
        line-height: 1.2;
        margin-bottom: 36px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.95);
    }

    /* Pills inferiores: envío + cuotas, ahora MÁS GRANDES */
    .pills {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .pill {
        display: inline-flex;
        align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 18px 32px;
        border: 2px solid #d4a017;
        color: #d4a017;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(6px);
        border-radius: 3px;
        text-transform: uppercase;
        text-shadow: none;
    }

    .pill-cuotas {
        background: rgba(212, 160, 23, 0.95);
        color: #0a0a0a;
        border-color: #d4a017;
    }

    .pill-cuotas .cuotas-mini {
        font-weight: 500;
        margin-left: 10px;
        opacity: 0.80;
        font-size: 18px;
        letter-spacing: 0.5px;
        text-transform: none;
    }
</style>
</head>
<body>

    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-base"></div>
    <div class="overlay-tint"></div>
    <div class="accent-line"></div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="precio-tachado">{precio_original_formateado}</div>
        <div class="precio-principal">{precio_efectivo_formateado}</div>
        <div class="precio-condicion">En efectivo o transferencia</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="pills">
            <div class="pill">Envío gratis +$150K</div>
            <div class="pill pill-cuotas">{cuotas_num} cuotas <span class="cuotas-mini">de {cuota_formateada}</span></div>
        </div>
    </div>

</body>
</html>
