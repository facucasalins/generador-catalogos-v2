<!-- DESC: Placa default Antonia (4:5 Meta) — foto full-bleed, precio efectivo, 6 cuotas sobre promo -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 1080px;
        height: 1350px;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        background: #e8ddd0;
        color: #3a2a24;
        -webkit-font-smoothing: antialiased;
    }

    /* IMAGEN DEL PRODUCTO: cubre toda la placa (fondo) */
    .product-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* OVERLAY BASE: gradient suave desde abajo para legibilidad del texto.
       Más suave que Shark — no queremos oscurecer tanto, Antonia es luminosa. */
    .overlay-base {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            180deg,
            rgba(255, 245, 235, 0.35) 0%,
            rgba(255, 245, 235, 0.10) 22%,
            rgba(232, 221, 208, 0.05) 45%,
            rgba(212, 168, 156, 0.65) 75%,
            rgba(180, 130, 120, 0.92) 100%
        );
        z-index: 2;
    }

    /* TINT cálido nude */
    .overlay-tint {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 35%, rgba(180, 130, 120, 0.18) 100%);
        z-index: 3;
        pointer-events: none;
    }

    /* Franja superior rosa empolvado (como la del sitio: envío gratis + cuotas + transf) */
    .top-banner {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 58px;
        background: rgba(212, 168, 156, 0.92);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 8;
        font-family: 'Inter', sans-serif;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 1.5px;
        color: #ffffff;
        text-transform: uppercase;
        text-shadow: 0 1px 2px rgba(120, 70, 60, 0.25);
    }

    /* LOGO arriba a la derecha, debajo de la franja */
    .header {
        position: absolute;
        top: 95px;
        right: 60px;
        z-index: 10;
    }

    .logo {
        height: 95px;
        width: auto;
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 12px rgba(80, 50, 45, 0.55))
                drop-shadow(0 0 20px rgba(80, 50, 45, 0.35));
        display: block;
    }

    /* INFO ZONE: precio + nombre + pills */
    .info-zone {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 70px 75px 70px;
        z-index: 10;
        text-align: center;
        text-shadow: 0 2px 14px rgba(80, 50, 45, 0.75);
    }

    /* Precio tachado (precio lista, el original) */
    .precio-tachado {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 42px;
        font-weight: 500;
        color: rgba(255, 245, 235, 0.85);
        text-decoration: line-through;
        text-decoration-color: rgba(255, 245, 235, 0.85);
        text-decoration-thickness: 2px;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    /* Precio principal = precio EFECTIVO (transferencia, -20% sobre promo) */
    .precio-principal {
        font-family: 'Playfair Display', serif;
        font-size: 168px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -3px;
        color: #fff5eb;
        margin-bottom: 12px;
        text-shadow:
            0 4px 24px rgba(80, 50, 45, 0.85),
            0 0 60px rgba(80, 50, 45, 0.5);
    }

    /* Texto chico "EN TRANSFERENCIA" debajo del precio */
    .precio-condicion {
        font-family: 'Inter', sans-serif;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 3.5px;
        color: #fff5eb;
        text-transform: uppercase;
        margin-bottom: 26px;
        text-shadow: 0 1px 8px rgba(80, 50, 45, 0.9);
        opacity: 0.95;
    }

    /* Línea separadora */
    .divider {
        width: 70px;
        height: 1.5px;
        background: rgba(255, 245, 235, 0.85);
        margin: 0 auto 24px auto;
    }

    /* Nombre del producto — cursiva como las labels del sitio */
    .nombre {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 44px;
        font-weight: 600;
        color: #fff5eb;
        letter-spacing: 0.5px;
        line-height: 1.15;
        margin-bottom: 32px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-shadow: 0 2px 16px rgba(80, 50, 45, 0.9);
    }

    /* Pills inferiores: envío + cuotas */
    .pills {
        display: flex;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
    }

    .pill {
        display: inline-flex;
        align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 1.8px;
        padding: 16px 30px;
        background: rgba(255, 245, 235, 0.95);
        color: #8a4f44;
        border-radius: 50px;
        text-transform: uppercase;
        text-shadow: none;
        box-shadow: 0 4px 16px rgba(80, 50, 45, 0.25);
    }

    .pill-cuotas {
        background: rgba(212, 168, 156, 0.97);
        color: #fff5eb;
    }

    .pill-cuotas .cuotas-mini {
        font-weight: 500;
        margin-left: 10px;
        opacity: 0.92;
        font-size: 17px;
        letter-spacing: 0.5px;
        text-transform: none;
    }
</style>
</head>
<body>

    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-base"></div>
    <div class="overlay-tint"></div>

    <div class="top-banner">Envío gratis +$150.000 · 6 cuotas sin interés · 20% OFF Transferencia</div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="precio-tachado">{precio_original_formateado}</div>
        <div class="precio-principal">{precio_efectivo_formateado}</div>
        <div class="precio-condicion">En transferencia</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="pills">
            <div class="pill">Envío gratis</div>
            <div class="pill pill-cuotas">{cuotas_num} cuotas <span class="cuotas-mini">de {cuota_formateada}</span></div>
        </div>
    </div>

</body>
</html>
