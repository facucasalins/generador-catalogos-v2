# ====================================================================
# Pipeline de MoraShop V2
# ====================================================================
# Estado: Fases B, C, D, E.1 y E.2 (Meta feed).
# Próximo: E.3 (Destino TikTok).
# ====================================================================

cliente:
  nombre: morashop
  brand_name: MORASHOP
  zona_horaria: America/Argentina/Buenos_Aires


# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: MORASHOP_TIENDANUBE_STORE_ID
    access_token_secret: MORASHOP_TIENDANUBE_TOKEN

    sheet_destino:
      id: "1902u_7ofkHjRTAa5uClX0Nof5d2JaauJLxNcCPkMagU"
      pestaña: Inventario


# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "1NOG91buD9co2Er4G0lobFGySyFql1i23vEZSjzqcWCI"
      pestaña: Seleccion
    template_default: default


# ============ BLOQUE 4: ESTILO ============
estilo:
  motor: playwright_html
  config:
    placa_width: 1080
    placa_height: 1350
    hotsale_discount_factor: 1.0

    variables_globales:
      brand_name: MORASHOP
      logo_url: "https://acdn-us.mitiendanube.com/stores/002/268/228/themes/toluca/img-479084497-1715570316-13b884ee9ca022bcfa337bfec6db35451715570316.png?3248503917"
      evento_legal: "Válido durante Mora Hot."


# ============ BLOQUE 5: DISTRIBUCIÓN ============
distribucion:
  # 5.1 — Storage
  storage:
    backend: cloudinary
    config:
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      folder: morashop-v2

  # 5.2 — Destinos: dónde se publica el feed
  destinos:
    - tipo: meta_catalog
      config:
        sheet:
          # Sheet "MoraShop V2 - Feed-Output"
          # ⚠️ COMPLETAR: pegar el ID del sheet que creaste en Drive
          id: "REEMPLAZAR_CON_SHEET_ID_DEL_FEED"
          pestaña: Meta
        moneda: ARS
        # Si True, availability se calcula del stock real de TN.
        calcular_availability_por_stock: true

    # E.3 pendiente: agregar destino tiktok_catalog acá
