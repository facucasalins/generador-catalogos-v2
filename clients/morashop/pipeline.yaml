# ====================================================================
# Pipeline de MoraShop V2
# ====================================================================
# Estado: Fases B, C, D y E.1 (Storage Cloudinary).
# Próximos pasos: E.2 (Destino Meta), E.3 (Destino TikTok).
# ====================================================================

cliente:
  nombre: morashop
  brand_name: MORASHOP
  zona_horaria: America/Argentina/Buenos_Aires


# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: MORASHOP_TIENDANUBE_STORE_ID
    access_token_secret: MORASHOP_TIENDANUBE_TOKEN

    sheet_destino:
      id: "1902u_7ofkHjRTAa5uClX0Nof5d2JaauJLxNcCPkMagU"
      pestaña: Inventario


# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "1NOG91buD9co2Er4G0lobFGySyFql1i23vEZSjzqcWCI"
      pestaña: Seleccion
    template_default: default


# ============ BLOQUE 4: ESTILO ============
estilo:
  motor: playwright_html
  config:
    placa_width: 1080
    placa_height: 1350
    hotsale_discount_factor: 1.0

    variables_globales:
      brand_name: MORASHOP
      logo_url: "https://acdn-us.mitiendanube.com/stores/002/268/228/themes/toluca/img-479084497-1715570316-13b884ee9ca022bcfa337bfec6db35451715570316.png?3248503917"
      evento_legal: "Válido durante Mora Hot."


# ============ BLOQUE 5: DISTRIBUCIÓN ============
distribucion:
  # 5.1 — Storage: dónde se suben las placas para tener URL pública
  storage:
    backend: cloudinary
    config:
      # Las credenciales vienen de GitHub Secrets (no acá).
      # El YAML solo nombra qué secret usar (default funciona para Mora).
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      # Folder dentro de Cloudinary. NO es "morashop" (v1) — v2 vive aparte.
      folder: morashop-v2

  # 5.2 — Destinos: pendientes (Meta, TikTok). Se agregan acá cuando se implementen.
  # destinos:
  #   - tipo: meta_catalog
  #     ...
  #   - tipo: tiktok_catalog
  #     ...
