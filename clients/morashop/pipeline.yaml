# ====================================================================
# Pipeline de MoraShop V2 (multi-template)
# ====================================================================
cliente:
  nombre: morashop
  brand_name: MORASHOP
  zona_horaria: America/Argentina/Buenos_Aires

# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: MORASHOP_TIENDANUBE_STORE_ID
    access_token_secret: MORASHOP_TIENDANUBE_TOKEN
    sheet_destino:
      id: "1902u_7ofkHjRTAa5uClX0Nof5d2JaauJLxNcCPkMagU"
      pestaña: Inventario

# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "1NOG91buD9co2Er4G0lobFGySyFql1i23vEZSjzqcWCI"
      pestaña: Seleccion

# ============ BLOQUE 3: ENRIQUECIMIENTO ============
enriquecimiento:
  proveedor: gemini
  config:
    api_key_secret: GEMINI_API_KEY
    modelo: gemini-2.5-flash
    max_chars_titulo: 60
    max_chars_descripcion: 200
    cantidad_tips: 3
    max_chars_tip: 40
    tono: "Argentino. Usa voseo cuando corresponda (ej: 'llevátelo', 'es para vos'). Lenguaje natural, sin extranjerismos innecesarios."

# ============ BLOQUE 4: ESTILO ============
# Cada template declara sus dimensiones en <!-- META --> del HTML.
estilo:
  motor: playwright_html
  config:
    hotsale_discount_factor: 1.0
    descuento_efectivo_factor: 0.85
    cuotas_sobre_promocional: true
    variables_globales:
      brand_name: MORASHOP
      logo_url: "https://acdn-us.mitiendanube.com/stores/002/268/228/themes/toluca/img-479084497-1715570316-13b884ee9ca022bcfa337bfec6db35451715570316.png?3248503917"
      evento_legal: "Válido durante Mora Hot."

# ============ BLOQUE 5: DISTRIBUCIÓN ============
distribucion:
  # Etiqueta fija del feed: distingue las placas de este pipeline del feed
  # nativo de Tiendanube cuando conviven en el mismo catálogo (filtro/retargeting).
  internal_label: "nusa_placa"
  storage:
    backend: cloudinary
    config:
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      folder: morashop

  destinos:
    - tipo: meta_catalog
      config:
        sheet_id: "1oDOXmgeVgSAuC3J20NaQ5t5J8FSuCaH0Gv2lecluqlw"
        moneda: ARS
        calcular_availability_por_stock: true
        aspect_ratios_aceptados: ["4:5", "9:16", "1:1"]
    - tipo: tiktok_catalog
      config:
        sheet_id: "1oDOXmgeVgSAuC3J20NaQ5t5J8FSuCaH0Gv2lecluqlw"
        moneda: ARS
        calcular_availability_por_stock: true
        aspect_ratios_aceptados: ["4:5", "9:16", "1:1"]
