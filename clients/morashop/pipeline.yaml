# ====================================================================
# Pipeline de MoraShop V2
# ====================================================================
# Estado: Fases B, C, D, E.1, E.2 (refactor) y E.3 (TikTok).
# Cada destino genera N pestañas, una por template usado.
# ====================================================================

cliente:
  nombre: morashop
  brand_name: MORASHOP
  zona_horaria: America/Argentina/Buenos_Aires


# ============ BLOQUE 1: INVENTARIO ============
inventario:
  fuente: tiendanube
  config:
    store_id_secret: MORASHOP_TIENDANUBE_STORE_ID
    access_token_secret: MORASHOP_TIENDANUBE_TOKEN
    sheet_destino:
      id: "1902u_7ofkHjRTAa5uClX0Nof5d2JaauJLxNcCPkMagU"
      pestaña: Inventario


# ============ BLOQUE 2: SELECCIÓN ============
seleccion:
  fuente: sheet_manual
  config:
    sheet:
      id: "1NOG91buD9co2Er4G0lobFGySyFql1i23vEZSjzqcWCI"
      pestaña: Seleccion
    template_default: default


# ============ BLOQUE 4: ESTILO ============
estilo:
  motor: playwright_html
  config:
    placa_width: 1080
    placa_height: 1350
    hotsale_discount_factor: 1.0
    variables_globales:
      brand_name: MORASHOP
      logo_url: "https://acdn-us.mitiendanube.com/stores/002/268/228/themes/toluca/img-479084497-1715570316-13b884ee9ca022bcfa337bfec6db35451715570316.png?3248503917"
      evento_legal: "Válido durante Mora Hot."


# ============ BLOQUE 5: DISTRIBUCIÓN ============
distribucion:
  # 5.1 — Storage
  storage:
    backend: cloudinary
    config:
      cloud_name_secret: CLOUDINARY_CLOUD_NAME
      api_key_secret: CLOUDINARY_API_KEY
      api_secret_secret: CLOUDINARY_API_SECRET
      folder: morashop-v2

  # 5.2 — Destinos: cada uno escribe N pestañas en su sheet, 1 por template.
  # Ejemplo: si hay 2 templates (default, electrohogar):
  #   - Meta crea pestañas: Meta_default, Meta_electrohogar
  #   - TikTok crea pestañas: TikTok_default, TikTok_electrohogar
  # Las pestañas se crean automáticamente si no existen.
  destinos:
    - tipo: meta_catalog
      config:
        # Sheet "MoraShop V2 - Feed-Output" (mismo sheet para Meta y TikTok)
        sheet_id: "REEMPLAZAR_CON_SHEET_ID_DEL_FEED"
        moneda: ARS
        calcular_availability_por_stock: true

    - tipo: tiktok_catalog
      config:
        # Mismo sheet que Meta. Las pestañas Meta_* y TikTok_* conviven.
        sheet_id: "REEMPLAZAR_CON_SHEET_ID_DEL_FEED"
        moneda: ARS
        calcular_availability_por_stock: true
