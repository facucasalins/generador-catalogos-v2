<!-- DESC: Template base de Mora — placa simple con precio y marca -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 1080px; height: 1350px; font-family: Arial, sans-serif; margin: 0; }
  .header { height: 200px; background: #1a3a6e; }
  .product { height: 720px; display: flex; align-items: center; justify-content: center; }
  .product img { max-width: 90%; max-height: 90%; }
  .price-box { height: 300px; background: #e63946; color: white; text-align: center; padding: 20px; }
  .price-old { font-size: 36px; text-decoration: line-through; opacity: 0.8; }
  .price-new { font-size: 120px; font-weight: 900; }
  .footer { height: 130px; background: #1a3a6e; color: white; text-align: center; font-size: 32px; padding-top: 40px; }
</style>
</head>
<body>
  <div class="header"></div>
  <div class="product"><img src="{imagen_url}" alt="{nombre}"></div>
  <div class="price-box">
    <div class="price-old">${precio_lista}</div>
    <div class="price-new">${precio_promocional}</div>
  </div>
  <div class="footer">{brand_name}</div>
</body>
</html>
