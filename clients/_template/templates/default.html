<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Placa Template</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
    display: flex;
    flex-direction: column;
  }
  .header {
    height: 200px;
    background: #1a3a6e;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    padding: 60px;
  }
  .product img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .price {
    height: 250px;
    background: #e63946;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .price-old {
    font-size: 36px;
    text-decoration: line-through;
    opacity: 0.8;
  }
  .price-new {
    font-size: 110px;
    font-weight: 900;
  }
  .footer {
    height: 80px;
    background: #1a3a6e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="header">
    <img src="{logo_b64}" alt="logo" style="max-height: 120px;">
  </div>

  <div class="product">
    <img src="{imagen_b64}" alt="producto">
  </div>

  <div class="price">
    <div class="price-old">{precio_original_formateado}</div>
    <div class="price-new">{precio_hotsale_formateado}</div>
  </div>

  <div class="footer">
    {brand_name}
  </div>
</body>
</html>
