<!-- DESC: Placa default Shark 4:5 — punto de partida basado en Mora (sin descuento efectivo) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;700&family=Archivo+Black&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 1080px;
        height: 1350px;
        background: #1a1a1a;
        font-family: 'Archivo', sans-serif;
        position: relative;
        overflow: hidden;
    }

    /* Decoración top-left */
    .deco-x {
        position: absolute;
        top: 30px;
        left: 30px;
        color: #ffffff;
        font-size: 32px;
        letter-spacing: 8px;
        font-weight: bold;
        opacity: 0.6;
    }

    /* Decoración círculo punteado top-right */
    .deco-circle {
        position: absolute;
        top: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border: 3px dotted #ffffff;
        border-radius: 50%;
        opacity: 0.6;
    }

    /* Logo centrado arriba */
    .logo {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: auto;
        z-index: 10;
    }

    /* Zona blanca del producto */
    .product-zone {
        position: absolute;
        top: 230px;
        left: 80px;
        right: 80px;
        height: 700px;
        background: #ffffff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
    }

    .product-image {
        max-width: 104%;
        max-height: 100%;
        object-fit: contain;
    }

    /* Banda de precio */
    .price-band {
        position: absolute;
        top: 970px;
        left: 0;
        right: 0;
        height: 280px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
        color: #1a1a1a;
    }

    .price-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .desde {
        font-family: 'Archivo Black', sans-serif;
        font-size: 32px;
        letter-spacing: 2px;
        margin-bottom: 4px;
    }

    .precio-tachado {
        font-family: 'Archivo', sans-serif;
        font-size: 38px;
        text-decoration: line-through;
        opacity: 0.6;
        margin-bottom: 4px;
        font-weight: 700;
    }

    .precio-principal {
        font-family: 'Archivo Black', sans-serif;
        font-size: 130px;
        line-height: 1;
        letter-spacing: -2px;
    }

    .price-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        position: relative;
    }

    .sin-interes {
        background: #1a1a1a;
        color: #ffffff;
        font-family: 'Archivo Black', sans-serif;
        font-size: 14px;
        padding: 4px 12px;
        transform: rotate(6deg);
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    .cuotas-num {
        font-family: 'Archivo Black', sans-serif;
        font-size: 56px;
        line-height: 1;
    }

    .cuotas-monto {
        font-family: 'Archivo', sans-serif;
        font-size: 28px;
        margin-top: 4px;
    }

    /* Banner inferior */
    .bottom-banner {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100px;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
        color: white;
        border-top: 3px solid #ffffff;
    }

    .banner-left {
        display: flex;
        flex-direction: column;
    }

    .banner-legal {
        font-family: 'Archivo', sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.5px;
        line-height: 1.2;
    }

    .banner-legal-small {
        font-family: 'Archivo', sans-serif;
        font-size: 14px;
        font-weight: 400;
        margin-top: 2px;
        opacity: 0.9;
    }

    .banner-brand {
        font-family: 'Archivo Black', sans-serif;
        font-size: 36px;
        letter-spacing: 2px;
    }
</style>
</head>
<body>
    <div class="deco-x">× × ×<br>× × ×</div>
    <div class="deco-circle"></div>

    <img class="logo" src="{logo_b64}" alt="logo">

    <div class="product-zone">
        <img class="product-image" src="{imagen_b64}" alt="producto">
    </div>

    <div class="price-band">
        <div class="price-left">
            <div class="desde">DESDE</div>
            <div class="precio-tachado">{precio_original_formateado}</div>
            <div class="precio-principal">{precio_hotsale_formateado}</div>
        </div>

        <div class="price-right">
            <div class="sin-interes">SIN INTERÉS</div>
            <div class="cuotas-num">{cuotas_num} CUOTAS</div>
            <div class="cuotas-monto">de {cuota_formateada}</div>
        </div>
    </div>

    <div class="bottom-banner">
        <div class="banner-left">
            <div class="banner-legal">Envíos a todo el país.</div>
            <div class="banner-legal-small">{evento_legal}</div>
        </div>
        <div class="banner-brand">{brand_name}</div>
    </div>
</body>
</html>
