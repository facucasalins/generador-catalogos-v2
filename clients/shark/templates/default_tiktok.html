<!-- DESC: Placa default Shark (9:16 TikTok) — imagen del producto full-bleed + overlay con info -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 1080px;
        height: 1920px;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        background: #000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
    }

    /* IMAGEN DEL PRODUCTO: cubre toda la placa (fondo) */
    .product-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* GRADIENT OVERLAY: 9:16 necesita más altura inferior oscurecida
       porque la info-zone es más grande */
    .overlay-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            180deg,
            rgba(0, 0, 0, 0.45) 0%,
            rgba(0, 0, 0, 0.15) 15%,
            rgba(0, 0, 0, 0.10) 40%,
            rgba(0, 0, 0, 0.65) 70%,
            rgba(0, 0, 0, 0.92) 100%
        );
        z-index: 2;
    }

    /* Línea fina amarilla decorativa */
    .accent-line {
        position: absolute;
        left: 70px;
        top: 70px;
        width: 2px;
        height: 100px;
        background: linear-gradient(180deg, #d4a017 0%, transparent 100%);
        z-index: 5;
    }

    /* HEADER */
    .header {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        padding: 0 70px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        z-index: 10;
    }

    .logo {
        height: 70px;
        width: auto;
        filter: brightness(0) invert(1)
                drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
        opacity: 0.95;
    }

    /* INFO ZONE: mitad inferior, más aire que en 4:5 */
    .info-zone {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 90px 140px 90px;
        z-index: 10;
        text-align: center;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.85);
    }

    .precio-tachado {
        font-family: 'Inter', sans-serif;
        font-size: 42px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: line-through;
        text-decoration-color: #d4a017;
        text-decoration-thickness: 2px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
    }

    .precio-principal {
        font-family: 'Inter', sans-serif;
        font-size: 200px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -6px;
        color: #ffffff;
        margin-bottom: 40px;
        text-shadow:
            0 6px 30px rgba(0, 0, 0, 0.9),
            0 0 100px rgba(212, 160, 23, 0.2);
    }

    .divider {
        width: 80px;
        height: 4px;
        background: #d4a017;
        margin: 0 auto 36px auto;
        box-shadow: 0 0 10px rgba(212, 160, 23, 0.5);
    }

    .nombre {
        font-family: 'Inter', sans-serif;
        font-size: 44px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.3px;
        line-height: 1.2;
        margin-bottom: 36px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .badge-envio {
        display: inline-block;
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2.5px;
        color: #d4a017;
        padding: 14px 30px;
        border: 2px solid #d4a017;
        border-radius: 2px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
    }

    .footer {
        position: absolute;
        bottom: 50px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 5px;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        z-index: 10;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
    }
</style>
</head>
<body>

    <img class="product-image" src="{imagen_b64}" alt="producto">
    <div class="overlay-gradient"></div>
    <div class="accent-line"></div>

    <div class="header">
        <img class="logo" src="{logo_b64}" alt="logo">
    </div>

    <div class="info-zone">
        <div class="precio-tachado">{precio_original_formateado}</div>
        <div class="precio-principal">{precio_hotsale_formateado}</div>
        <div class="divider"></div>
        <div class="nombre">{nombre}</div>
        <div class="badge-envio">Envío gratis</div>
    </div>

    <div class="footer">tiendashark.com.ar</div>

</body>
</html>
